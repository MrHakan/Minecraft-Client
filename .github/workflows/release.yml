name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v26.2). If empty, uses the current commit's short SHA."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Read mod version
        id: version
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="v${MOD_VERSION}-$(git rev-parse --short HEAD)"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          # Tag names conventionally start with 'v'; the human-readable
          # release title drops it.
          echo "release_name=Agalar Hack ${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build --stacktrace

      - name: List built jars
        run: ls -la build/libs/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/libs/agalarhack-${{ steps.version.outputs.mod_version }}.jar
            build/libs/agalarhack-${{ steps.version.outputs.mod_version }}-sources.jar
